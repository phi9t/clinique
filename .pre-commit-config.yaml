# Install: uv sync && uv run pre-commit install
# Manual:  uv run pre-commit run --all-files
minimum_pre_commit_version: "3.2.0"

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff-check
        name: ruff · lint + import hygiene
        args: [--fix]
      - id: ruff-format
        name: ruff · format

  - repo: local
    hooks:
      - id: ruff-ci-gate
        name: ruff check + format --check (CI parity)
        entry: scripts/pre-commit-ruff.sh
        language: system
        pass_filenames: false
        always_run: true

      - id: pytest-temporal-e2e
        name: pytest (full suite incl. temporal e2e)
        entry: scripts/pre-commit-pytest.sh
        language: system
        pass_filenames: false
        always_run: true
